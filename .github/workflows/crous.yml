name: Bot CROUS

# Quand se lancer :
on:
  schedule:
    - cron: "*/5 * * * *"      # toutes les 5 min (GitHub peut retarder un peu)
  workflow_dispatch:            # + bouton pour lancer a la main (test)

# Autorise le workflow a sauvegarder l'etat (les logements deja vus)
permissions:
  contents: write

# Empeche deux executions en meme temps
concurrency:
  group: bot-crous
  cancel-in-progress: false

jobs:
  verifier:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les librairies
        run: pip install requests beautifulsoup4

      - name: Lancer le bot (une verification)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot-telegram.py

      - name: Sauvegarder les logements deja vus
        run: |
          git config user.name "bot-crous"
          git config user.email "bot-crous@users.noreply.github.com"
          git add logements_vus.json
          git commit -m "maj logements vus" || echo "rien a sauvegarder"
          git push || echo "rien a pousser"
